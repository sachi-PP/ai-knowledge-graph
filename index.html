// ═══════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════
const bgCanvas = document.getElementById('bg');
const mainCanvas = document.getElementById('main');
const bgCtx = bgCanvas.getContext('2d');
const ctx = mainCanvas.getContext('2d');

// 离屏缓存 canvas（背景静态部分）
const offCanvas = document.createElement('canvas');
const offCtx = offCanvas.getContext('2d');
let bgDirty = true; // 标记背景是否需要重绘

let W, H, cx, cy, R;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  bgCanvas.width = mainCanvas.width = W;
  bgCanvas.height = mainCanvas.height = H;
  offCanvas.width = W; offCanvas.height = H;
  cx = W / 2; cy = H * 0.62;
  R = Math.min(W, H) * 0.36;
  bgDirty = true;
}
resize();
window.addEventListener('resize', () => { resize(); initStars(); buildNodes(); });

// ═══════════════════════════════════════
//  BACKGROUND: GALAXY
// ═══════════════════════════════════════
let stars = [], meteors = [];
// 预生成螺旋臂粒子（固定位置，不每帧random）
let spiralPts = [];
function buildSpiralPts() {
  spiralPts = [];
  for (let arm = 0; arm < 3; arm++) {
    for (let i = 0; i < 80; i++) {
      const t2 = i / 80;
      const angle = (arm / 3) * Math.PI * 2 + t2 * Math.PI * 2.5;
      const r = t2 * 0.45; // normalized, multiply by screen size later
      spiralPts.push({
        arm, t2,
        cosA: Math.cos(angle), sinA: Math.sin(angle),
        r, alpha: (1 - t2) * 0.15,
        dotR: Math.random() * 2 + 0.5,
      });
    }
  }
}
buildSpiralPts();

function initStars() {
  stars = [];
  // 降低密度：1200→2000，减少星星数量
  const count = Math.floor(W * H / 2000);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 1.5 + 0.2,
      alpha: Math.random() * 0.8 + 0.2,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinklePhase: Math.random() * Math.PI * 2,
      color: ['#ffffff','#ffe8d6','#d6e8ff','#ffd6ff'][Math.floor(Math.random()*4)]
    });
  }
  bgDirty = true;
}
initStars();

function spawnMeteor() {
  if (meteors.length < 3 && Math.random() < 0.003) {
    const startX = Math.random() * W;
    meteors.push({
      x: startX, y: -10,
      vx: (Math.random() - 0.3) * 4 + 2,
      vy: Math.random() * 3 + 2,
      len: Math.random() * 120 + 60,
      alpha: 1, life: 1
    });
  }
}

let galaxyAngle = 0;
let lastBgT = -9999; // 上次绘制静态背景的时间

function drawStaticBg() {
  // 只绘制不动的部分：底色 + 星云 + 螺旋臂 → 缓存到 offCanvas
  offCtx.fillStyle = '#000005';
  offCtx.fillRect(0, 0, W, H);

  // Galaxy nebula glow
  const grad = offCtx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.7);
  grad.addColorStop(0, 'rgba(20,10,60,0.5)');
  grad.addColorStop(0.3, 'rgba(10,5,40,0.3)');
  grad.addColorStop(0.6, 'rgba(5,0,20,0.2)');
  grad.addColorStop(1, 'rgba(0,0,5,0)');
  offCtx.fillStyle = grad;
  offCtx.fillRect(0, 0, W, H);

  // Spiral arms（用预生成固定点，无 random）
  const screenR = Math.min(W, H);
  offCtx.save();
  offCtx.translate(cx, cy);
  spiralPts.forEach(pt => {
    const angle = (pt.arm / 3) * Math.PI * 2 + galaxyAngle + pt.t2 * Math.PI * 2.5;
    const px = Math.cos(angle) * pt.r * screenR;
    const py = Math.sin(angle) * pt.r * screenR * 0.4;
    offCtx.beginPath();
    offCtx.arc(px, py, pt.dotR, 0, Math.PI * 2);
    offCtx.fillStyle = `rgba(180,140,255,${pt.alpha})`;
    offCtx.fill();
  });
  offCtx.restore();

  // Stars（静态，不闪烁，闪烁在主循环里用 globalAlpha 叠加）
  stars.forEach(s => {
    offCtx.beginPath();
    offCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    offCtx.globalAlpha = s.alpha;
    offCtx.fillStyle = s.color;
    offCtx.fill();
  });
  offCtx.globalAlpha = 1;
  bgDirty = false;
}

function drawBackground(t) {
  // 静态背景：每3秒或dirty时才重绘螺旋臂（星云很慢，视觉无感知）
  const needRebuild = bgDirty || (t - lastBgT > 3000);
  if (needRebuild) {
    galaxyAngle += 0.0001 * (t - lastBgT);
    lastBgT = t;
    drawStaticBg();
  }

  // 把缓存贴到 bgCanvas
  bgCtx.drawImage(offCanvas, 0, 0);

  // 星星闪烁叠加（只改 alpha，不重绘底色，非常轻量）
  const tSec = t * 0.001;
  // 只让1/3的星星每帧闪烁（轮换批次），降低绘制量
  const batchSize = Math.ceil(stars.length / 3);
  const batchStart = Math.floor(tSec * 20) % 3 * batchSize;
  for (let i = batchStart; i < Math.min(batchStart + batchSize, stars.length); i++) {
    const s = stars[i];
    const tw = Math.sin(tSec * s.twinkleSpeed * 60 + s.twinklePhase);
    const a = s.alpha * (0.6 + 0.4 * tw);
    bgCtx.beginPath();
    bgCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    bgCtx.globalAlpha = a;
    bgCtx.fillStyle = s.color;
    bgCtx.fill();
  }
  bgCtx.globalAlpha = 1;

  // Meteors（动态，每帧都画）
  spawnMeteor();
  meteors = meteors.filter(m => m.alpha > 0.01);
  meteors.forEach(m => {
    m.x += m.vx; m.y += m.vy; m.alpha -= 0.015;
    const spd = Math.sqrt(m.vx*m.vx + m.vy*m.vy);
    const tailX = m.x - m.vx * (m.len / spd);
    const tailY = m.y - m.vy * (m.len / spd);
    const mg = bgCtx.createLinearGradient(tailX, tailY, m.x, m.y);
    mg.addColorStop(0, 'rgba(255,255,255,0)');
    mg.addColorStop(1, `rgba(255,255,255,${m.alpha})`);
    bgCtx.beginPath();
    bgCtx.moveTo(tailX, tailY);
    bgCtx.lineTo(m.x, m.y);
    bgCtx.strokeStyle = mg;
    bgCtx.lineWidth = 1.5;
    bgCtx.stroke();
  });
}

// ═══════════════════════════════════════
//  3D SPHERE NODES
// ═══════════════════════════════════════
let nodes3d = [];
let rotX = 0.3, rotY = 0;
let targetRotX = 0.3, targetRotY = 0;
let autoRotate = true;

// Fibonacci sphere distribution
function fibonacciSphere(n) {
  const pts = [];
  const golden = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < n; i++) {
    const y = 1 - (i / (n - 1));  // 上半球 y∈[0,1]
    const radius = Math.sqrt(1 - y * y);
    const theta = golden * i;
    pts.push({ x: Math.cos(theta) * radius, y, z: Math.sin(theta) * radius });
  }
  return pts;
}

let nodeMap = new Map(); // id → node，避免每帧 find

function buildNodes() {
  const positions = fibonacciSphere(NODES_DATA.length);
  nodes3d = NODES_DATA.map((d, i) => ({
    ...d,
    sx: positions[i].x,
    sy: positions[i].y,
    sz: positions[i].z,
    px: 0, py: 0, pz: 0, depth: 0,
    pulsePhase: Math.random() * Math.PI * 2,
    particleT: Math.random(),
  }));
  nodeMap.clear();
  nodes3d.forEach(n => nodeMap.set(n.id, n));
}
buildNodes();

function rotatePoint(x, y, z, rx, ry) {
  // Rotate around Y axis
  let x1 = x * Math.cos(ry) + z * Math.sin(ry);
  let z1 = -x * Math.sin(ry) + z * Math.cos(ry);
  // Rotate around X axis
  let y2 = y * Math.cos(rx) - z1 * Math.sin(rx);
  let z2 = y * Math.sin(rx) + z1 * Math.cos(rx);
  return { x: x1, y: y2, z: z2 };
}

function projectNode(n) {
  const p = rotatePoint(n.sx, n.sy, n.sz, rotX, rotY);
  n.pz = p.z;
  n.visible = p.y >= -0.04;  // 隐藏翻转到下半球的节点
  const fov = 2.5;
  const scale = fov / (fov + 1 - p.z);
  n.px = cx + p.x * R * scale;
  n.py = cy + p.y * R * scale;
  n.depth = (p.z + 1) / 2; // 0=far, 1=near
  n.scale = scale;
}

// ═══════════════════════════════════════
//  PARTICLES ON EDGES
// ═══════════════════════════════════════
const particles = [];
const MAX_PARTICLES = 200;

function spawnEdgeParticles(fromId, toId) {
  if (particles.length > MAX_PARTICLES) return;
  if (!nodeMap.has(fromId) || !nodeMap.has(toId)) return;
  for (let i = 0; i < 3; i++) {
    particles.push({
      fromId, toId,
      t: Math.random(),
      speed: Math.random() * 0.008 + 0.004,
      dead: false,
      size: Math.random() * 2 + 1,
    });
  }
}

// ═══════════════════════════════════════
//  SELECTED NODE & PANEL
// ═══════════════════════════════════════
let selectedId = null;
let hoveredId = null;

function openPanel(node) {
  selectedId = node.id;
  selectedColor = CATEGORIES[node.cat]?.color || '#ffffff';
  document.getElementById('panel-name').textContent = node.name;
  const cat = CATEGORIES[node.cat];
  document.getElementById('panel-category').textContent = cat.label;
  document.getElementById('panel-category').style.color = cat.color;

  const body = document.getElementById('panel-body');
  body.innerHTML = `
    <div class="panel-section">
      <div class="panel-text">👵 ${node.granny}</div>
    </div>
    <div class="panel-section">
      <div class="panel-text">${node.meme}</div>
    </div>
    <div class="panel-section">
      <div class="panel-text">⚙️ ${node.tech}</div>
    </div>
  `;

  // Related chips
  const related = EDGES
    .filter(e => e[0] === node.id || e[1] === node.id)
    .map(e => e[0] === node.id ? e[1] : e[0])
    .slice(0, 10);
  const chips = document.getElementById('panel-chips');
  chips.innerHTML = related.map(id => {
    const rn = NODES_DATA.find(n => n.id === id);
    if (!rn) return '';
    const rc = CATEGORIES[rn.cat];
    return `<span class="chip" onclick="focusNode('${id}')" style="border-color:${rc.color}40;color:${rc.color}">${rn.name}</span>`;
  }).join('');

  document.getElementById('panel').classList.add('open');

  // Spawn particles on connected edges
  EDGES.forEach(e => {
    if (e[0] === node.id || e[1] === node.id) {
      for (let i = 0; i < 5; i++) spawnEdgeParticles(e[0], e[1]);
    }
  });

  // Auto-rotate to bring node to front
  const n = nodes3d.find(nd => nd.id === node.id);
  if (n) {
    // Calculate target rotation to bring node to front
    const p = rotatePoint(n.sx, n.sy, n.sz, rotX, rotY);
    targetRotY = rotY - Math.atan2(p.x, p.z);
    targetRotX = rotX - Math.atan2(p.y, Math.sqrt(p.x*p.x + p.z*p.z));
    autoRotate = false;
  }
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  selectedId = null;
  autoRotate = true;
}

window.focusNode = function(id) {
  const node = NODES_DATA.find(n => n.id === id);
  if (node) openPanel(node);
};

document.getElementById('panel-close').addEventListener('click', closePanel);

// ═══════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════
// 预计算选中节点的颜色，避免循环内重复查找
let selectedColor = '#ffffff';

function drawEdges() {
  // 先画普通边（批量 path，减少 stroke 调用次数）
  ctx.beginPath();
  ctx.lineWidth = 0.5;
  EDGES.forEach(([aId, bId]) => {
    if (selectedId && (aId === selectedId || bId === selectedId)) return; // 高亮边单独画
    const a = nodeMap.get(aId), b = nodeMap.get(bId);
    if (!a || !b) return;
    // 两端都在背面则跳过
    if (!a.visible || !b.visible) return;
    if (a.depth < 0.1 && b.depth < 0.1) return;
    const avgDepth = (a.depth + b.depth) / 2;
    ctx.moveTo(a.px, a.py);
    ctx.lineTo(b.px, b.py);
  });
  ctx.strokeStyle = 'rgba(100,120,200,0.18)';
  ctx.stroke();

  // 再画高亮边
  if (selectedId) {
    ctx.beginPath();
    ctx.lineWidth = 1.5;
    EDGES.forEach(([aId, bId]) => {
      if (aId !== selectedId && bId !== selectedId) return;
      const a = nodeMap.get(aId), b = nodeMap.get(bId);
      if (!a || !b || !a.visible || !b.visible) return;
      ctx.moveTo(a.px, a.py);
      ctx.lineTo(b.px, b.py);
    });
    ctx.strokeStyle = selectedColor + '80';
    ctx.stroke();
  }
}

function drawParticles() {
  // 用标记代替 splice，避免 O(n²) 的数组重排
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    const from = nodeMap.get(p.fromId);
    const to = nodeMap.get(p.toId);
    if (!from || !to || !from.visible || !to.visible) { p.dead = true; continue; }

    p.t += p.speed;
    if (p.t > 1) p.t -= 1;

    const x = from.px + (to.px - from.px) * p.t;
    const y = from.py + (to.py - from.py) * p.t;
    const depth = from.depth + (to.depth - from.depth) * p.t;
    if (depth < 0.05) continue; // 背面不画

    const fromCat = CATEGORIES[from.cat];
    ctx.beginPath();
    ctx.arc(x, y, p.size * depth, 0, Math.PI * 2);
    ctx.fillStyle = fromCat.color + 'cc';
    ctx.fill();
  }
  // 统一清理死亡粒子
  if (particles.some(p => p.dead)) {
    particles.splice(0, particles.length, ...particles.filter(p => !p.dead));
  }
}

function drawNodes(t) {
  // Sort by depth (far to near) — 用 sort 避免重建数组
  nodes3d.sort((a, b) => a.depth - b.depth);
  const tSec = t * 0.001;

  nodes3d.forEach(n => {
    const cat = CATEGORIES[n.cat];
    const isSelected = n.id === selectedId;
    const isHovered = n.id === hoveredId;

    const baseSize = [0, 4, 7, 11][n.size];
    const sz = baseSize * (0.5 + n.depth * 0.8) * n.scale;
    const alpha = 0.3 + n.depth * 0.7;

    // 下半球节点不显示
    if (!n.visible) return;
    // 背面极小节点直接跳过
    if (sz < 1 && !isSelected && !isHovered) return;

    // Glow（只对近处 + 选中 + hover 节点）
    if (isSelected || isHovered || n.depth > 0.65) {
      const pulse = Math.sin(tSec * 1.5 + n.pulsePhase) * 0.5 + 0.5;
      const glowSize = sz * (isSelected ? 4 : 2.5) + pulse * sz * 0.5;
      const grd = ctx.createRadialGradient(n.px, n.py, 0, n.px, n.py, glowSize);
      const glowAlpha = (isSelected ? 0.6 : 0.3) * alpha;
      grd.addColorStop(0, cat.glow.replace('0.4', String(glowAlpha.toFixed(2))));
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(n.px, n.py, glowSize, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
    }

    // Node circle：近处用渐变，远处用纯色（省去 createRadialGradient 开销）
    ctx.beginPath();
    ctx.arc(n.px, n.py, sz, 0, Math.PI * 2);
    ctx.globalAlpha = alpha;
    if (n.depth > 0.4) {
      const nodeGrd = ctx.createRadialGradient(n.px - sz*0.3, n.py - sz*0.3, 0, n.px, n.py, sz);
      nodeGrd.addColorStop(0, cat.color + 'ff');
      nodeGrd.addColorStop(0.5, cat.color + 'cc');
      nodeGrd.addColorStop(1, cat.color + '44');
      ctx.fillStyle = nodeGrd;
    } else {
      ctx.fillStyle = cat.color + '66'; // 远处纯色，更快
    }
    ctx.fill();
    ctx.globalAlpha = 1;

    // Border（仅选中）
    if (isSelected) {
      ctx.beginPath();
      ctx.arc(n.px, n.py, sz + 3, 0, Math.PI * 2);
      ctx.strokeStyle = cat.color;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Label：减少文字绘制量，背面节点不画
    const showLabel = n.depth > 0.45 || isSelected || isHovered || n.size === 3;
    if (showLabel) {
      const fontSize = Math.max(9, Math.min(14, sz * 1.2 + 6));
      ctx.font = `${isSelected ? 'bold ' : ''}${fontSize}px "Noto Sans SC", sans-serif`;
      ctx.textAlign = 'center';
      const labelY = n.py + sz + fontSize + 2;
      const labelAlpha = Math.min(1, (n.depth - 0.3) * 2) * alpha;
      ctx.globalAlpha = labelAlpha;
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillText(n.name, n.px + 1, labelY + 1);
      ctx.fillStyle = isSelected ? cat.color : '#ffffff';
      ctx.fillText(n.name, n.px, labelY);
      ctx.globalAlpha = 1;
    }
  });
}

// ═══════════════════════════════════════
//  MOUSE INTERACTION
// ═══════════════════════════════════════
let isDragging = false, lastMX = 0, lastMY = 0;
let velX = 0, velY = 0;

mainCanvas.addEventListener('mousedown', e => {
  isDragging = true; lastMX = e.clientX; lastMY = e.clientY;
  velX = velY = 0; autoRotate = false;
});
window.addEventListener('mousemove', e => {
  if (isDragging) {
    const dx = e.clientX - lastMX;
    const dy = e.clientY - lastMY;
    velX = dy * 0.005; velY = dx * 0.005;
    targetRotX += dy * 0.005;
    targetRotX = Math.max(-0.05, Math.min(Math.PI * 0.4, targetRotX));
    targetRotY += dx * 0.005;
    lastMX = e.clientX; lastMY = e.clientY;
  } else {
    // Hover detection
    const mx = e.clientX, my = e.clientY;
    hoveredId = null;
    for (const n of nodes3d) {
      const dist = Math.hypot(n.px - mx, n.py - my);
      const sz = [0,4,7,11][n.size] * (0.5 + n.depth * 0.8) * n.scale;
      if (dist < sz + 8) { hoveredId = n.id; break; }
    }
    mainCanvas.style.cursor = hoveredId ? 'pointer' : 'grab';
  }
});
window.addEventListener('mouseup', e => {
  if (isDragging && Math.abs(e.clientX - lastMX) < 3 && Math.abs(e.clientY - lastMY) < 3) {
    // Click
    const mx = e.clientX, my = e.clientY;
    for (const n of nodes3d) {
      const dist = Math.hypot(n.px - mx, n.py - my);
      const sz = [0,4,7,11][n.size] * (0.5 + n.depth * 0.8) * n.scale;
      if (dist < sz + 8) { openPanel(n); break; }
    }
  }
  isDragging = false;
  if (!selectedId) autoRotate = true;
});

// Touch support
mainCanvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  isDragging = true; lastMX = t.clientX; lastMY = t.clientY;
  autoRotate = false;
}, { passive: false });
mainCanvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  const dx = t.clientX - lastMX, dy = t.clientY - lastMY;
  targetRotX += dy * 0.005;
  targetRotX = Math.max(-0.05, Math.min(Math.PI * 0.4, targetRotX));
  targetRotY += dx * 0.005;
  lastMX = t.clientX; lastMY = t.clientY;
}, { passive: false });
mainCanvas.addEventListener('touchend', () => { isDragging = false; });

// Wheel zoom
let zoom = 1;
mainCanvas.addEventListener('wheel', e => {
  zoom = Math.max(0.5, Math.min(2, zoom - e.deltaY * 0.001));
  R = Math.min(W, H) * 0.36 * zoom;
});

// ═══════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════
document.getElementById('search-input').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  if (!q) return;
  const found = NODES_DATA.find(n =>
    n.name.toLowerCase().includes(q) || n.id.toLowerCase().includes(q)
  );
  if (found) {
    openPanel(found);
    e.target.style.borderColor = 'rgba(52,211,153,0.8)';

document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    e.target.value = '';
    e.target.style.borderColor = '';
    closePanel();
  }
  e.stopPropagation();
});

// ═══════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════
let lastT = 0;
const TARGET_FPS = 60;
const FRAME_MS = 1000 / TARGET_FPS;

function loop(t) {
  requestAnimationFrame(loop);

  // 帧率限制：超过60fps时跳过，避免高刷屏浪费
  const dt = t - lastT;
  if (dt < FRAME_MS - 1) return;
  lastT = t;

  // Smooth rotation
  if (autoRotate) targetRotY += 0.002;
  // 限制 rotX 范围：防止半球翻转到下面
  targetRotX = Math.max(-0.05, Math.min(Math.PI * 0.4, targetRotX));
  rotX += (targetRotX - rotX) * 0.08;
  rotY += (targetRotY - rotY) * 0.08;

  // Project all nodes
  nodes3d.forEach(n => projectNode(n));

  // Background
  drawBackground(t);

  // Main canvas
  ctx.clearRect(0, 0, W, H);

  // Hemisphere wireframe
  // 上半弧
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI, true);
  ctx.strokeStyle = 'rgba(100,120,255,0.1)';
  ctx.lineWidth = 1;
  ctx.stroke();
  // 平底线
  ctx.beginPath();
  ctx.moveTo(cx - R, cy);
  ctx.lineTo(cx + R, cy);
  ctx.strokeStyle = 'rgba(100,120,255,0.12)';
  ctx.stroke();
  // 底面椭圆（深度感）
  ctx.beginPath();
  ctx.ellipse(cx, cy, R, R * 0.13, 0, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(100,120,255,0.06)';
  ctx.stroke();

  drawEdges();
  drawParticles();
  drawNodes(t);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
